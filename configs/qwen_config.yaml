# 阿里云通义千问 API 配置
# Model: qwen3.5-plus
# Base URL: https://dashscope.aliyuncs.com/compatible-mode/v1

model:
  # 默认使用通义千问
  default: "qwen3.5-plus"

  # 通义千问配置
  qwen:
    model_name: "qwen3.5-plus"
    api_key: "sk-0a47c3d5c923462c9696de8d36dc08ba"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    max_tokens: 2000
    temperature: 0.7

  # 备用模型配置
  fallback:
    model_name: "qwen-turbo"
    api_key: "sk-0a47c3d5c923462c9696de8d36dc08ba"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

# 任务类型到模型映射
task_model_mapping:
  Type-0: "local"      # 简单任务使用本地模型
  Type-1: "local"      # 路径跟随使用本地模型
  Type-2: "qwen"       # 目标搜索使用通义千问
  Type-3: "qwen"       # 空间推理使用通义千问
  Type-4: "qwen"       # 复杂决策使用通义千问

# 导航系统配置
navigation:
  max_steps: 500
  stop_distance: 0.2
  turn_angle: 15.0

# 分类器配置
classifier:
  rule_threshold: 0.9
  use_llm_fallback: true
  cache_results: true

# 日志级别
logging:
  level: "INFO"